name: 🚀 Déployer sur InfinityFree

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 📦 Préparer les fichiers
        run: |
          cp includes/config.example.php includes/config.php
          # Modifier config.php avec les variables secrètes
          sed -i "s/'localhost'/'${{ secrets.DB_HOST }}'/" includes/config.php
          sed -i "s/'plateforme_examens'/'${{ secrets.DB_NAME }}'/" includes/config.php
          sed -i "s/'root'/'${{ secrets.DB_USER }}'/" includes/config.php
          sed -i "s/''/'${{ secrets.DB_PASS }}'/" includes/config.php

      - name: 🚀 Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: /htdocs/